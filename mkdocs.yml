site_name: Dnamw's blog

theme:
  name: material
  custom_dir: overrides

  features:
    - navigation.sections
    - navigation.instant
    - navigation.top
    - content.code.copy
  
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default       
      primary: blue       
      accent: deep purple   
      toggle:
          icon: material/brightness-7
          name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate 
      primary: black
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      linenums: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tilde
  - pymdownx.superfences

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

repo_name: GitHub
repo_url: https://github.com/dnamw/blog

nav:
  - Home: index.md
  - Programming Tips:
      - Index: programming_tips/index.md
      - C String and String_Views: programming_tips/c_string.md
      - Quine: programming_tips/quine.md